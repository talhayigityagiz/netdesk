name: Build NetDesk macOS

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

env:
  MAC_RUST_VERSION: "1.81"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"
  APP_NAME: "NetDesk"

jobs:
  build-macos:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            os: macos-14
            vcpkg-triplet: arm64-osx
            deployment_target: "12.3"
          - arch: x86_64
            os: macos-15-intel
            vcpkg-triplet: x64-osx
            deployment_target: "10.14"
            
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build runtime
        run: |
          brew install llvm create-dmg pkg-config
          wget https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Bridge Dependencies
        run: |
          cargo install cargo-expand --version 1.0.95 --locked
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked
          pushd flutter && flutter pub get && popd

      - name: Generate Bridge Code
        run: |
          $HOME/.cargo/bin/flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart --c-output ./flutter/macos/Runner/bridge_generated.h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: ${{ matrix.arch }}-apple-darwin

      - name: Setup vcpkg with retry
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg-triplet }}

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install \
            --triplet ${{ matrix.vcpkg-triplet }} \
            --x-install-root="$VCPKG_ROOT/installed"

      - name: Build Rust library for ${{ matrix.arch }}
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
          CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER: "clang"
          CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER: "clang"
        run: |
          RUST_TARGET="${{ matrix.arch }}-apple-darwin"
          # Build the Rust library targeting the correct architecture
          cargo build \
            --target "$RUST_TARGET" \
            --features hwcodec,screencapturekit \
            --release
          
          # The output path includes the target triple when --target is specified
          RUST_RELEASE_DIR="target/$RUST_TARGET/release"
          
          echo "Verifying Rust build output:"
          ls -al "$RUST_RELEASE_DIR/libnetdesk.dylib" || { echo "ERROR: libnetdesk.dylib not found!"; exit 1; }
          
          # Copy the dylib to both the arch-specific and generic release directory
          # so the Xcode project can find it at ../../target/release/libnetdesk.dylib
          mkdir -p target/release
          cp "$RUST_RELEASE_DIR/libnetdesk.dylib" target/release/libnetdesk.dylib
          cp "$RUST_RELEASE_DIR/libnetdesk.dylib" target/release/netdesk.dylib
          
          # Also copy the service binary if it exists
          if [ -f "$RUST_RELEASE_DIR/service" ]; then
            cp "$RUST_RELEASE_DIR/service" target/release/service
          fi

      - name: Build Flutter macOS app
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.deployment_target }}
        run: |
          pushd flutter
          flutter build macos --release
          popd

      - name: Verify app bundle and copy service binary
        run: |
          APP_PATH="./flutter/build/macos/Build/Products/Release/${{ env.APP_NAME }}.app"
          echo "=== Listing Release directory ==="
          ls -al ./flutter/build/macos/Build/Products/Release/ || true
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: ${{ env.APP_NAME }}.app not found in Release directory!"
            exit 1
          fi
          echo "Found ${{ env.APP_NAME }}.app"
          # Copy service binary if it exists
          if [ -f "target/release/service" ]; then
            cp -rf target/release/service "$APP_PATH/Contents/MacOS/"
            echo "Copied service binary."
          else
            echo "No service binary found, skipping."
          fi

      - name: Create DMG
        run: |
          create-dmg \
            --icon "${{ env.APP_NAME }}.app" 200 190 \
            --hide-extension "${{ env.APP_NAME }}.app" \
            --window-size 800 400 \
            --app-drop-link 600 185 \
            "netdesk-${{ env.VERSION }}-${{ matrix.arch }}.dmg" \
            "./flutter/build/macos/Build/Products/Release/${{ env.APP_NAME }}.app"

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netdesk-macos-${{ matrix.arch }}
          path: "*.dmg"
