name: Build NetDesk Windows

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  RUST_VERSION: "1.81"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"
  APP_NAME: "NetDesk"

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Cache Cargo registry and git dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-x64-cargo-

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Bridge Dependencies
        run: |
          cargo install cargo-expand --version 1.0.95 --locked
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked
          pushd flutter; flutter pub get; popd

      - name: Generate Bridge Code
        shell: bash
        run: |
          "$HOME/.cargo/bin/flutter_rust_bridge_codegen" \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/windows/runner/bridge_generated.h

      - name: Prepare vcpkg baseline
        shell: bash
        run: |
          cd vcpkg
          git fetch --unshallow || true
          git fetch --all

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Download prebuilt FFmpeg 6.1 dev (Windows x64 gpl-shared)
        shell: pwsh
        run: |
          # hwcodec uses AVFrame::key_frame which was removed in FFmpeg 7.0.
          # Pin to FFmpeg 6.1 which still exposes that field.
          # Pin to FFmpeg 6.1.x as BtbN 'master' is now FFmpeg 7.0+ which lacks AVFrame::key_frame.
          # Verified URL from BtbN releases (Nov 2024 build).
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2024-11-30-13-12/ffmpeg-n6.1.2-15-ga6a07eebdf-win64-gpl-shared-6.1.zip"
          Write-Host "Downloading FFmpeg 6.1 from: $url"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\ffmpeg.zip" -UseBasicParsing

          Expand-Archive -Path "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg" -Force
          $ffmpegDir = (Get-ChildItem "$env:TEMP\ffmpeg" -Directory | Select-Object -First 1).FullName
          echo "FFMPEG_DIR=$ffmpegDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "FFMPEG_INCLUDE_DIR=$ffmpegDir\include" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "FFMPEG_LIB_DIR=$ffmpegDir\lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "FFmpeg 6.1 installed to: $ffmpegDir"
          Get-ChildItem "$ffmpegDir\include"



      - name: Install vcpkg manifest dependencies
        run: |
          & "$env:VCPKG_ROOT\vcpkg" install --triplet x64-windows-static

      - name: Build virtual display library
        shell: bash
        run: |
          cd libs/virtual_display/dylib
          cargo build --release
          cd ../../..

      - name: Download and setup Intel Media SDK
        shell: pwsh
        run: |
          # Download Intel Media SDK (oneVPL) - using a verified working release
          $url = "https://github.com/Intel-Media-SDK/MediaSDK/releases/download/intel-mediasdk-23.2.2/MediaStack_MSVC_x64.zip"
          Write-Host "Downloading Intel Media SDK from: $url"
          try {
            Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\mediasdk.zip" -UseBasicParsing -ErrorAction Stop
            Expand-Archive -Path "$env:TEMP\mediasdk.zip" -DestinationPath "$env:TEMP\mediasdk" -Force
            $mediaSdkDir = "$env:TEMP\mediasdk\MediaStack_MSVC_x64"
          } catch {
            Write-Host "Failed to download from primary URL, falling back to vcpkg mfx-dispatch..."
            # Fallback: create mock MediaSDK structure from vcpkg's mfx-dispatch
            $vcpkgInstalled = "$PWD\vcpkg_installed\x64-windows-static"
            $mediaSdkDir = "$env:TEMP\mediasdk\MediaStack_MSVC_x64"
            New-Item -ItemType Directory -Force -Path "$mediaSdkDir\lib\x64" | Out-Null
            New-Item -ItemType Directory -Force -Path "$mediaSdkDir\include" | Out-Null
            # Copy vcpkg's mfx.lib and rename to libmfx.lib which hwcodec expects
            if (Test-Path "$vcpkgInstalled\lib\mfx.lib") {
              Copy-Item "$vcpkgInstalled\lib\mfx.lib" "$mediaSdkDir\lib\x64\libmfx.lib" -Force
            }
            if (Test-Path "$vcpkgInstalled\include\mfx") {
              Copy-Item "$vcpkgInstalled\include\mfx\*" "$mediaSdkDir\include\" -Recurse -Force
            }
          }
          
          echo "MEDIASDK_DIR=$mediaSdkDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "MEDIASDK_LIB_DIR=$mediaSdkDir\lib\x64" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "MEDIASDK_INCLUDE_DIR=$mediaSdkDir\include" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Intel Media SDK configured at: $mediaSdkDir"

      - name: Verify vcpkg opus installation
        shell: pwsh
        run: |
          $opusInclude = "$PWD\vcpkg_installed\x64-windows-static\include\opus"
          if (Test-Path $opusInclude) {
            Write-Host "✓ Opus headers found at: $opusInclude"
            Get-ChildItem $opusInclude
          } else {
            Write-Host "✗ Opus headers NOT found at: $opusInclude"
            Write-Host "Available include directories:"
            Get-ChildItem "$PWD\vcpkg_installed\x64-windows-static\include" -ErrorAction SilentlyContinue | Select-Object Name
            exit 1
          }

      - name: Build Rust library
        shell: pwsh
        env:
          FFMPEG_DIR: ${{ env.FFMPEG_DIR }}
          FFMPEG_INCLUDE_DIR: ${{ env.FFMPEG_INCLUDE_DIR }}
          FFMPEG_LIB_DIR: ${{ env.FFMPEG_LIB_DIR }}
          MEDIASDK_DIR: ${{ env.MEDIASDK_DIR }}
          MEDIASDK_LIB_DIR: ${{ env.MEDIASDK_LIB_DIR }}
          MEDIASDK_INCLUDE_DIR: ${{ env.MEDIASDK_INCLUDE_DIR }}
        run: |
          $vcpkgInstalled = "$PWD\vcpkg_installed"
          $env:FFMPEG_DIR         = "$env:FFMPEG_DIR"
          $env:FFMPEG_INCLUDE_DIR = "$env:FFMPEG_INCLUDE_DIR"
          $env:FFMPEG_LIB_DIR     = "$env:FFMPEG_LIB_DIR"
          $env:MEDIASDK_DIR       = "$env:MEDIASDK_DIR"
          $env:MEDIASDK_LIB_DIR   = "$env:MEDIASDK_LIB_DIR"
          $env:MEDIASDK_INCLUDE_DIR = "$env:MEDIASDK_INCLUDE_DIR"
          # Set RUSTFLAGS to help the linker find FFmpeg and Media SDK and explicitly link libmfx
          $env:RUSTFLAGS          = "-L $env:FFMPEG_LIB_DIR -L $env:MEDIASDK_LIB_DIR -l mfx"
          # Expose headers and libs to the MSVC compiler/linker
          $env:INCLUDE = "$env:FFMPEG_INCLUDE_DIR;$env:MEDIASDK_INCLUDE_DIR;$vcpkgInstalled\x64-windows-static\include;$vcpkgInstalled\x64-windows-static\include\opus;$env:INCLUDE"
          $env:LIB     = "$env:FFMPEG_LIB_DIR;$env:MEDIASDK_LIB_DIR;$vcpkgInstalled\x64-windows-static\lib;$env:LIB"
          # Add LIBCLANG_PATH for proper C header detection
          $env:LIBCLANG_PATH = "C:\Program Files\LLVM\bin"
          Write-Host "FFMPEG_DIR          = $env:FFMPEG_DIR"
          Write-Host "FFMPEG_INCLUDE_DIR  = $env:FFMPEG_INCLUDE_DIR"
          Write-Host "FFMPEG_LIB_DIR      = $env:FFMPEG_LIB_DIR"
          Write-Host "MEDIASDK_DIR        = $env:MEDIASDK_DIR"
          Write-Host "MEDIASDK_LIB_DIR    = $env:MEDIASDK_LIB_DIR"
          Write-Host "MEDIASDK_INCLUDE_DIR= $env:MEDIASDK_INCLUDE_DIR"
          Write-Host "RUSTFLAGS           = $env:RUSTFLAGS"
          Write-Host "INCLUDE paths       = $env:INCLUDE"
          Write-Host "LIB paths           = $env:LIB"
          cargo build `
            --target x86_64-pc-windows-msvc `
            --features flutter,hwcodec,vram `
            --lib `
            --release
          $dll = "target\x86_64-pc-windows-msvc\release\netdesk.dll"
          if (-not (Test-Path $dll)) { Write-Error "ERROR: netdesk.dll not found!"; exit 1 }
          New-Item -ItemType Directory -Force -Path target\release
          Copy-Item $dll target\release\netdesk.dll -Force

      - name: Build Flutter Windows app
        shell: bash
        run: |
          cd flutter
          flutter build windows --release
          cd ..

      - name: Copy dylib_virtual_display.dll
        shell: bash
        run: |
          RELEASE_DIR="flutter/build/windows/x64/runner/Release"
          if [ -f "target/release/deps/dylib_virtual_display.dll" ]; then
            cp target/release/deps/dylib_virtual_display.dll "$RELEASE_DIR/"
          elif [ -f "libs/virtual_display/dylib/target/release/dylib_virtual_display.dll" ]; then
            cp libs/virtual_display/dylib/target/release/dylib_virtual_display.dll "$RELEASE_DIR/"
          else
            echo "WARNING: dylib_virtual_display.dll not found, skipping."
          fi

      - name: Verify Flutter build output
        shell: bash
        run: |
          RELEASE_DIR="flutter/build/windows/x64/runner/Release"
          if [ ! -d "$RELEASE_DIR" ]; then
            echo "ERROR: Flutter release folder not found at $RELEASE_DIR"
            exit 1
          fi
          echo "=== Release contents ==="
          ls -al "$RELEASE_DIR"

      - name: Package as ZIP
        shell: pwsh
        run: |
          $releaseDir = "flutter\build\windows\x64\runner\Release"
          $zipName    = "netdesk-${{ env.VERSION }}-windows-x64.zip"
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $zipName -Force
          Write-Host "Created: $zipName"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netdesk-windows-x64
          path: netdesk-${{ env.VERSION }}-windows-x64.zip
