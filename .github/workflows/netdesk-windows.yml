name: Build NetDesk Windows

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  RUST_VERSION: "1.81"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"
  APP_NAME: "NetDesk"

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt, clippy

      - name: Cache Cargo registry and git dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-x64-cargo-

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Bridge Dependencies
        run: |
          cargo install cargo-expand --version 1.0.95 --locked
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features "uuid" --locked
          pushd flutter; flutter pub get; popd

      - name: Generate Bridge Code
        shell: bash
        run: |
          "$HOME/.cargo/bin/flutter_rust_bridge_codegen" \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/windows/runner/bridge_generated.h

      - name: Prepare vcpkg baseline
        shell: bash
        run: |
          cd vcpkg
          git fetch --unshallow || true
          git fetch --all

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Download prebuilt FFmpeg dev (Windows x64 static)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\ffmpeg.zip" -UseBasicParsing
          Expand-Archive -Path "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg" -Force
          $ffmpegDir = (Get-ChildItem "$env:TEMP\ffmpeg" -Directory | Select-Object -First 1).FullName
          echo "FFMPEG_DIR=$ffmpegDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "FFMPEG_INCLUDE_DIR=$ffmpegDir\include" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "FFMPEG_LIB_DIR=$ffmpegDir\lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "FFmpeg installed to: $ffmpegDir"
          ls "$ffmpegDir\include"

      - name: Install vcpkg manifest dependencies
        run: |
          & "$env:VCPKG_ROOT\vcpkg" install

      - name: Build virtual display library
        shell: bash
        run: |
          cd libs/virtual_display/dylib
          cargo build --release
          cd ../../..

      - name: Build Rust library
        shell: pwsh
        env:
          FFMPEG_DIR: ${{ env.FFMPEG_DIR }}
          FFMPEG_INCLUDE_DIR: ${{ env.FFMPEG_INCLUDE_DIR }}
          FFMPEG_LIB_DIR: ${{ env.FFMPEG_LIB_DIR }}
        run: |
          $env:FFMPEG_DIR         = "$env:FFMPEG_DIR"
          $env:FFMPEG_INCLUDE_DIR = "$env:FFMPEG_INCLUDE_DIR"
          $env:FFMPEG_LIB_DIR     = "$env:FFMPEG_LIB_DIR"
          # Expose headers and libs to the MSVC compiler/linker (cl.exe, link.exe)
          $env:INCLUDE = "$env:FFMPEG_INCLUDE_DIR;$env:INCLUDE"
          $env:LIB     = "$env:FFMPEG_LIB_DIR;$env:LIB"
          Write-Host "FFMPEG_DIR          = $env:FFMPEG_DIR"
          Write-Host "FFMPEG_INCLUDE_DIR  = $env:FFMPEG_INCLUDE_DIR"
          Write-Host "FFMPEG_LIB_DIR      = $env:FFMPEG_LIB_DIR"
          cargo build `
            --target x86_64-pc-windows-msvc `
            --features flutter,hwcodec,vram `
            --lib `
            --release
          $dll = "target\x86_64-pc-windows-msvc\release\netdesk.dll"
          if (-not (Test-Path $dll)) { Write-Error "ERROR: netdesk.dll not found!"; exit 1 }
          New-Item -ItemType Directory -Force -Path target\release
          Copy-Item $dll target\release\netdesk.dll -Force

      - name: Build Flutter Windows app
        shell: bash
        run: |
          cd flutter
          flutter build windows --release
          cd ..

      - name: Copy dylib_virtual_display.dll
        shell: bash
        run: |
          RELEASE_DIR="flutter/build/windows/x64/runner/Release"
          if [ -f "target/release/deps/dylib_virtual_display.dll" ]; then
            cp target/release/deps/dylib_virtual_display.dll "$RELEASE_DIR/"
          elif [ -f "libs/virtual_display/dylib/target/release/dylib_virtual_display.dll" ]; then
            cp libs/virtual_display/dylib/target/release/dylib_virtual_display.dll "$RELEASE_DIR/"
          else
            echo "WARNING: dylib_virtual_display.dll not found, skipping."
          fi

      - name: Verify Flutter build output
        shell: bash
        run: |
          RELEASE_DIR="flutter/build/windows/x64/runner/Release"
          if [ ! -d "$RELEASE_DIR" ]; then
            echo "ERROR: Flutter release folder not found at $RELEASE_DIR"
            exit 1
          fi
          echo "=== Release contents ==="
          ls -al "$RELEASE_DIR"

      - name: Package as ZIP
        shell: pwsh
        run: |
          $releaseDir = "flutter\build\windows\x64\runner\Release"
          $zipName    = "netdesk-${{ env.VERSION }}-windows-x64.zip"
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $zipName -Force
          Write-Host "Created: $zipName"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: netdesk-windows-x64
          path: netdesk-${{ env.VERSION }}-windows-x64.zip
